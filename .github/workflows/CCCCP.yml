# ⚡ Bolt: This workflow has been optimized for speed!
# Original sequential runtime: ~ (sum of all job times)
# Optimized parallel runtime: ~ (time of the longest job)
#
# 💡 What: Independent jobs now run in parallel instead of a sequence.
# 🎯 Why: Reduces total workflow time by not waiting unnecessarily.
# 📊 Impact: Significant reduction in CI/CD feedback loop time.
name: CritterCraft CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  # Job 1: Code Quality & Style (Rust)
  # Runs in parallel with other jobs.
  lint_and_format_rust:
    name: Code Quality & Style (Rust)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust Toolchain (stable)
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true
          components: rustfmt, clippy

      - name: Cache Cargo Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run Rustfmt (Code Formatter Check)
        run: cargo fmt --all -- --check
          
      - name: Run Clippy (Rust Linter)
        run: cargo clippy --all-targets -- -D warnings

  # Job 2: Build and Test the CritterCraft Blockchain Node
  # Runs in parallel. Consolidates build and test steps to avoid redundant setup.
  build_and_test_rust:
    name: Build & Test (Rust)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Install Rust Toolchain (stable)
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Cache Cargo Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build CritterCraft Node (Release Mode)
        run: cargo build --release --locked --workspace
      
      - name: Run All Rust Tests
        run: cargo test --workspace -- --nocapture
        
      - name: Upload Test Results (e.g., to Codecov)
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

  # Job 3: Security Vulnerability Scan (Rust Dependencies)
  # Runs in parallel. Can run as soon as code is checked out.
  security_audit_rust:
    name: Security Audit (Rust)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust Toolchain (stable)
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Cache Cargo Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run cargo-audit
        uses: actions-rs/audit-check@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # Job 4: Build Conceptual Frontend UI
  # Runs in parallel. Independent of all Rust jobs.
  build_frontend_ui:
    name: Build Frontend UI (Conceptual)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      - name: Install Frontend Dependencies
        # Assuming a dummy command as no package.json exists
        run: echo "Skipping install as no package.json found"
        # working-directory: ./blockchain_core/ui-wallet
      - name: Build Frontend
        # Assuming a dummy command
        run: echo "Skipping build as no build script is defined"
        # working-directory: ./blockchain_core/ui-wallet

  # Job 5: Check Documentation Integrity
  # Runs in parallel. Independent of all other jobs.
  check_documentation_integrity:
    name: Check Docs Integrity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Markdown Link Checker
        run: npm install -g markdown-link-check
      - name: Check Markdown Links
        run: find . -name "*.md" -print0 | xargs -0 -I{} markdown-link-check {}

  # Job 6 (Conceptual for full CI/CD): Deploy to Testnet/Staging
  # This job now depends on all critical checks passing in parallel.
  deploy_testnet:
    name: Deploy to Testnet
    runs-on: ubuntu-latest
    # This job depends on all critical build and test jobs passing
    needs: [build_and_test_rust, security_audit_rust, lint_and_format_rust, build_frontend_ui]
    if: false # Disabled for now as it's conceptual
    environment:
      name: testnet
      url: 'https://testnet.crittercraft.com'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Deploy CritterCraft Node & Frontend
        run: |
          echo "Deployment commands would go here."
