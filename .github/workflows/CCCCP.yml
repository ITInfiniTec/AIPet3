---
# ⚡ Bolt: This workflow is optimized for speed and correctness.
# It uses a "build-once, test-in-parallel" strategy to minimize redundant work.
# Key optimizations:
# 1. A single `build` job compiles the code and caches the artifacts.
# 2. `lint`, `test`, and `security_audit` jobs run in parallel after `build`.
# 3. These parallel jobs restore the cached build artifacts,
#    avoiding recompilation.
# 4. Uses `actions-rs/audit-check` for a faster security scan.
# 5. Ensures consistent `--release` profile across build and test jobs.
name: CritterCraft CI/CD Pipeline

# Follows the principle of least privilege.
permissions:
  contents: read

on:  # yamllint disable-line rule:truthy
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  # Job 1: Build the Rust code once and cache the artifacts.
  # Downstream jobs will restore this cache to avoid recompiling.
  build:
    name: Build Rust Artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Cache Cargo Dependencies & Build Artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build CritterCraft Node (Release Mode)
        # This step compiles the code and populates the `target` directory,
        # which is then cached for downstream jobs.
        run: cargo build --release --locked --workspace

  # Job 2: Run linters. This runs in parallel with test and security_audit.
  lint:
    name: Lint (fmt & clippy)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Restore Cached Artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check Code Formatting (rustfmt)
        run: cargo fmt --all -- --check

      - name: Run Linter (clippy)
        # Uses the cached build to run very quickly.
        run: cargo clippy --all-targets --release -- -D warnings

  # Job 3: Run tests. This runs in parallel with lint and security_audit.
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Restore Cached Artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run All Rust Tests
        # The `--release` flag is critical here. It tells Cargo to use the
        # existing release artifacts from the `build` job, preventing a full
        # recompile.
        run: cargo test --release --locked --workspace -- --nocapture

      - name: Upload Test Coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

  # Job 4: Run security audit. This runs in parallel with lint and test.
  security_audit:
    name: Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read  # required for actions/checkout
      security-events: write  # required for github/codeql-action/upload-sarif
      actions: read  # required for github/codeql-action/init
    needs: build
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Restore Cached Artifacts
        # Only needed if audit requires build artifacts, but good practice.
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run audit-check
        # This action is faster than `cargo install cargo-audit` and caches
        # the tool.
        uses: actions-rs/audit-check@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # The remaining jobs are conceptual and independent. They can run in parallel.
  build_frontend_ui:
    name: Build Frontend UI (Conceptual)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      - name: Install Frontend Dependencies
        # Assuming frontend code is in a 'ui-wallet' directory
        run: echo "Skipping for conceptual project"  # yarn install
        # working-directory: ./blockchain_core/ui-wallet
      - name: Build Frontend
        run: echo "Skipping for conceptual project"  # yarn build
        # working-directory: ./blockchain_core/ui-wallet

  check_documentation_integrity:
    name: Check Docs Integrity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Install Markdown Link Checker
        run: npm install -g markdown-link-check
      - name: Check Markdown Links
        run: >-
          find . -name "*.md" -print0 |
          xargs -0 -I{} markdown-link-check {}
