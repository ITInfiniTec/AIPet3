---
---
name: CritterCraft CI/CD Pipeline

on:  # yamllint disable-line rule:truthy
  # Triggers the workflow on push or pull request events for the "main" branch
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  # ⚡ OPTIMIZATION: This linting and formatting job now runs in parallel with
  # the build job, rather than sequentially, speeding up the pipeline.
  lint_and_format_rust:
    name: Code Quality & Style (Rust)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust Toolchain (stable)
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true
          # Install required components directly for efficiency
          components: rustfmt, clippy

      # ⚡ OPTIMIZATION: Caching is now handled within the job, removing the
      # need for a separate setup job and allowing this to run in parallel.
      - name: Cache Cargo Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run Rustfmt (Code Formatter Check)
        run: cargo fmt --all -- --check

      - name: Run Clippy (Rust Linter)
        run: cargo clippy --all-targets -- -D warnings

  # ⚡ OPTIMIZATION: The build job now runs in parallel with linting and other
  # independent jobs. It populates the build cache that is used by downstream
  # test and security jobs.
  build_node:
    name: Build CritterCraft Node
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust Toolchain (stable)
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      # ⚡ OPTIMIZATION: Consolidated and corrected caching logic.
      - name: Cache Cargo Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build CritterCraft Node (Release Mode)
        # --release is critical for performance and for downstream jobs.
        run: cargo build --release --locked --workspace

  # ⚡ OPTIMIZATION: Testing now depends only on the build job, allowing it to
  # run as soon as the build is complete, in parallel with the security audit.
  test_core_rust:
    name: Run Core Tests (Rust)
    runs-on: ubuntu-latest
    needs: [build_node]  # Depends only on a successful build
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust Toolchain (stable)
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      # ⚡ OPTIMIZATION: Restores the cache populated by the `build_node` job,
      # avoiding a re-build.
      - name: Restore Cargo Caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run All Rust Tests
        run: cargo test --workspace -- --nocapture

      - name: Upload Test Results (e.g., to Codecov for coverage)
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

  # ⚡ OPTIMIZATION: Security audit runs in parallel with tests, as soon as
  # the build is done.
  security_audit_rust:
    name: Security Audit (Rust)
    runs-on: ubuntu-latest
    needs: [build_node]  # Depends only on a successful build
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust Toolchain (stable)
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Restore Cargo Caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo-audit
        run: cargo audit --deny warnings

  # ⚡ OPTIMIZATION: This conceptual frontend job runs in parallel from the start
  build_frontend_ui:
    name: Build Frontend UI (Conceptual)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      - name: Install Frontend Dependencies
        run: yarn install  # or npm install
        working-directory: ./blockchain_core/ui-wallet
      - name: Build Frontend
        run: yarn build  # or npm run build
        working-directory: ./blockchain_core/ui-wallet

  # ⚡ OPTIMIZATION: Documentation check runs in parallel from the start.
  check_documentation_integrity:
    name: Check Docs Integrity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Install Markdown Link Checker
        run: npm install -g markdown-link-check
      - name: Check Markdown Links
        run: find . -name "*.md" -print0 | xargs -0 -I{} markdown-link-check {}

