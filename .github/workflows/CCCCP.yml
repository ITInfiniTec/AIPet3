name: CritterCraft CI/CD Pipeline

on:
  # Triggers the workflow on push or pull request events for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  # Allows you to run this workflow manually from the Actions tab (for full pipeline runs)
  workflow_dispatch:

jobs:
  # ====================================================================================
  # Job 1: Code Quality & Style (Rust Linting & Formatting)
  # ====================================================================================
  # ⚡ Bolt Optimization: This job now runs in parallel with build_node and security_audit_rust.
  #    It was previously part of a sequential chain, creating an unnecessary bottleneck.
  lint_and_format_rust:
    name: Code Quality & Style (Rust)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true
          components: rustfmt, clippy

      - name: Cache Cargo Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run Rustfmt (Code Formatter Check)
        run: cargo fmt --all -- --check
          
      - name: Run Clippy (Rust Linter)
        run: cargo clippy --all-targets -- -D warnings

  # ====================================================================================
  # Job 2: Build the CritterCraft Blockchain Node
  # ====================================================================================
  # ⚡ Bolt Optimization: This job now runs in parallel with linting and security checks,
  #    significantly reducing the total pipeline time. The 'test' job depends on this one.
  build_node:
    name: Build CritterCraft Node
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Install Rust Toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Cache Cargo Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build CritterCraft Node (Release Mode)
        run: cargo build --release --locked --workspace

  # ====================================================================================
  # Job 3: Security Vulnerability Scan (Rust Dependencies)
  # ====================================================================================
  # ⚡ Bolt Optimization: This job runs in parallel with the build and lint jobs.
  #    It no longer waits for the build to finish, as it only needs the Cargo.lock file.
  security_audit_rust:
    name: Security Audit (Rust)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Cache Cargo Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run cargo-audit
        run: cargo install cargo-audit && cargo audit --deny warnings

  # ====================================================================================
  # Job 4: Run Core Unit & Integration Tests (Rust)
  # ====================================================================================
  test_core_rust:
    name: Run Core Tests (Rust)
    runs-on: ubuntu-latest
    needs: [build_node] # Depends on a successful build, which is correct.
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Cache Cargo Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run All Rust Tests
        run: cargo test --workspace -- --nocapture
        
      - name: Upload Test Results (e.g., to Codecov for coverage, or a test reporting tool)
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

  # ====================================================================================
  # Job 5: Build Conceptual Frontend UI
  # ====================================================================================
  # ⚡ Bolt Optimization: Runs in parallel with all other initial jobs.
  build_frontend_ui:
    name: Build Frontend UI (Conceptual)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      - name: Install Frontend Dependencies
        # This will fail since there is no ui-wallet, but the logic is for demonstration
        run: yarn install || true
        working-directory: ./blockchain_core/ui-wallet 
      - name: Build Frontend
        run: yarn build || true
        working-directory: ./blockchain_core/ui-wallet

  # ====================================================================================
  # Job 6: Check Documentation Integrity
  # ====================================================================================
  # ⚡ Bolt Optimization: Runs in parallel with all other initial jobs.
  check_documentation_integrity:
    name: Check Docs Integrity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Install Markdown Link Checker
        run: npm install -g markdown-link-check
      - name: Check Markdown Links
        run: find . -name "*.md" -print0 | xargs -0 -I{} markdown-link-check {}

