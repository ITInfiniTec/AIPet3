---
name: CritterCraft CI/CD Pipeline

on:
  # Triggers the workflow on push or pull request events for the "main" branch
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# ⚡ OPTIMIZATION: This workflow is refactored for performance.
# A central `setup` job warms the cache, and subsequent jobs for lint, build,
# and security run in parallel to reduce total workflow time.
jobs:
  # Job 1: Centralized Setup & Cache Warming
  # Checks out code, sets up Rust, and populates the cache for other jobs.
  setup:
    name: Setup Environment & Cache
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true
          components: rustfmt, clippy

      - name: Cache Cargo Registry & Git DB
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: >-
            ${{ runner.os }}-cargo-registry-
            ${{ hashFiles('**/Cargo.lock') }}

      - name: Cache Cargo Build Artifacts
        uses: actions/cache@v4
        with:
          path: target
          key: >-
            ${{ runner.os }}-cargo-build-
            ${{ hashFiles('**/Cargo.lock') }}

  # Job 2: Code Quality & Style (Parallel)
  # Runs linting and formatting checks on the codebase. Depends on `setup`.
  lint:
    name: Code Quality (Lint & Format)
    runs-on: ubuntu-latest
    needs: [setup]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Install Rust Toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true
      # ⚡ CORRECTED CACHE: Restore registry and build caches separately
      # to ensure build artifacts from the `setup` job are used correctly.
      - name: Restore Cargo Registry Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: >-
            ${{ runner.os }}-cargo-registry-
            ${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-
      - name: Restore Cargo Build Cache
        uses: actions/cache@v4
        with:
          path: target
          key: >-
            ${{ runner.os }}-cargo-build-
            ${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-
      - name: Run Rustfmt (Formatter Check)
        run: cargo fmt --all -- --check
      - name: Run Clippy (Linter)
        run: cargo clippy --all-targets -- -D warnings

  # Job 3: Build the Node (Parallel)
  # Compiles the blockchain node in release mode. Depends on `setup`.
  build:
    name: Build CritterCraft Node
    runs-on: ubuntu-latest
    needs: [setup]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Install Rust Toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true
      # ⚡ CORRECTED CACHE: Restore registry and build caches separately.
      - name: Restore Cargo Registry Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: >-
            ${{ runner.os }}-cargo-registry-
            ${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-
      - name: Restore Cargo Build Cache
        uses: actions/cache@v4
        with:
          path: target
          key: >-
            ${{ runner.os }}-cargo-build-
            ${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-
      - name: Build Node (Release Mode)
        run: cargo build --release --locked --workspace

  # Job 4: Security Vulnerability Scan (Parallel)
  # Audits dependencies for known vulnerabilities. Depends on `setup`.
  security_audit:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: [setup]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Install Rust Toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true
      # ⚡ CORRECTED CACHE: Restore registry and build caches separately.
      - name: Restore Cargo Registry Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: >-
            ${{ runner.os }}-cargo-registry-
            ${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-
      - name: Restore Cargo Build Cache
        uses: actions/cache@v4
        with:
          path: target
          key: >-
            ${{ runner.os }}-cargo-build-
            ${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-
      - name: Run cargo-audit
        uses: actions-rs/audit-check@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # Job 5: Run Core Tests (Depends on Build)
  # Runs unit and integration tests after a successful build.
  test:
    name: Run Core Tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Install Rust Toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true
      # ⚡ CORRECTED CACHE: Restore registry and build caches separately.
      - name: Restore Cargo Registry Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: >-
            ${{ runner.os }}-cargo-registry-
            ${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-
      - name: Restore Cargo Build Cache
        uses: actions/cache@v4
        with:
          path: target
          key: >-
            ${{ runner.os }}-cargo-build-
            ${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-
      - name: Run All Rust Tests
        run: cargo test --workspace -- --nocapture
      - name: Upload Test Coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

  # Job 6: Check Documentation Integrity (Parallel)
  check_documentation_integrity:
    name: Check Docs Integrity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Install Markdown Link Checker
        run: npm install -g markdown-link-check
      - name: Check Markdown Links
        run: find . -name "*.md" -print0 | xargs -0 -I{} markdown-link-check {}
