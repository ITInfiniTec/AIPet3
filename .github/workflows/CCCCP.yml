---
name: CritterCraft CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  # ⚡ OPTIMIZATION: This job now runs in parallel with other initial jobs.
  # It focuses only on linting and formatting, without depending on a
  # separate setup job.
  lint_and_format_rust:
    name: Code Quality & Style (Rust)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust Toolchain (stable)
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true
          # ⚡ OPTIMIZATION: Install rustfmt and clippy directly with the
          # toolchain for efficiency.
          components: rustfmt, clippy

      - name: Cache Cargo Registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Run Rustfmt (Code Formatter Check)
        run: cargo fmt --all -- --check

      - name: Run Clippy (Rust Linter)
        run: cargo clippy --all-targets -- -D warnings

  # ⚡ OPTIMIZATION: This job now runs in parallel. It builds the node and
  # caches the build artifacts (`target` directory) for downstream jobs like
  # test and audit.
  build_node:
    name: Build CritterCraft Node
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust Toolchain (stable)
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Cache Cargo Registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache Cargo Build Artifacts
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-

      - name: Build CritterCraft Node (Release Mode)
        # --release is used to create an optimized build.
        run: cargo build --release --locked --workspace

  # ⚡ OPTIMIZATION: This job now runs in parallel with other initial jobs.
  build_frontend_ui:
    name: Build Frontend UI (Conceptual)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      - name: Install Frontend Dependencies
        # Assuming frontend code is in a 'ui-wallet' directory.
        run: yarn install
        working-directory: ./blockchain_core/ui-wallet
      - name: Build Frontend
        run: yarn build
        working-directory: ./blockchain_core/ui-wallet

  # ⚡ OPTIMIZATION: This job now runs in parallel with other initial jobs.
  check_documentation_integrity:
    name: Check Docs Integrity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Install Markdown Link Checker
        run: npm install -g markdown-link-check
      - name: Check Markdown Links
        run: find . -name "*.md" -print0 | xargs -0 -I{} markdown-link-check {}

  # ⚡ OPTIMIZATION: Depends only on the build_node job completing successfully.
  # It runs in parallel with the security_audit_rust job.
  test_core_rust:
    name: Run Core Tests (Rust)
    runs-on: ubuntu-latest
    needs: [build_node]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust Toolchain (stable)
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Cache Cargo Registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      # ⚡ OPTIMIZATION: Only restores the build cache; does not re-create it.
      - name: Restore Cargo Build Artifacts
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-

      - name: Run All Rust Tests
        # Use the same --release flag as the build job to leverage cache.
        run: cargo test --release --workspace -- --nocapture

      - name: Upload Test Results
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

  # ⚡ OPTIMIZATION: Depends only on the build_node job completing successfully.
  # It runs in parallel with the test_core_rust job.
  security_audit_rust:
    name: Security Audit (Rust)
    runs-on: ubuntu-latest
    needs: [build_node]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust Toolchain (stable)
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Cache Cargo Registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      # ⚡ OPTIMIZATION: The audit check action is efficient.
      - name: Run cargo-audit
        uses: actions-rs/audit-check@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
