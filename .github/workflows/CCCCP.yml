name: CritterCraft CI/CD Pipeline

on:
  # Triggers the workflow on push or pull request events for the "main" branch
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  # Allows you to run this workflow manually from the Actions tab
  # (for full pipeline runs)
  workflow_dispatch:

jobs:
  # Job 1: Setup Shared Rust Environment & Cache
  setup_rust_env:
    name: Setup Rust Toolchain & Cache
    runs-on: ubuntu-latest
    # Define outputs if you need to pass specific paths/versions to dependent jobs
    outputs:
      cargo-cache-key: ${{ steps.cache-cargo.outputs.cache-hit }}
      # No need to pass toolchain directly via output.

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust Toolchain (stable)
        # Uses a specific Rust action for better integration and caching.
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal  # Install only necessary components for CI.
          override: true    # Set this toolchain as the default.

      - name: Cache Cargo Registry
        # Caches ~/.cargo/registry to speed up subsequent runs.
        uses: actions/cache@v4
        id: cache-cargo
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-
      - name: Cache Cargo Build Artifacts
        # Caches target directory to speed up builds and tests.
        uses: actions/cache@v4
        id: cache-cargo-build
        with:
          path: target
          # Key depends on OS, Rust toolchain, and Cargo.lock changes.
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-

      - name: Install Rustfmt & Clippy (for linting/formatting job)
        run: |
          rustup component add rustfmt --toolchain stable
          rustup component add clippy --toolchain stable

  # Job 2: Code Quality & Style (Rust Linting & Formatting)
  lint_and_format_rust:
    name: Code Quality & Style (Rust)
    runs-on: ubuntu-latest
    needs: [setup_rust_env]  # Depends on the environment setup passing.
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Restore Rust environment and caches from setup_rust_env.
      - name: Restore Rust Toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Restore Cargo Registry Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Restore Cargo Build Artifacts Cache
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-
      - name: Run Rustfmt (Code Formatter Check)
        # --check-formatted ensures it's correctly formatted.
        run: cargo fmt --all -- --check
      - name: Run Clippy (Rust Linter)
        # -D warnings to treat warnings as errors for CI.
        run: cargo clippy --all-targets -- -D warnings

  # Job 3: Build the CritterCraft Blockchain Node
  build_node:
    name: Build CritterCraft Node
    runs-on: ubuntu-latest
    needs: [setup_rust_env]  # Depends on the setup job passing.
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      # Restore Rust environment and caches.
      - name: Restore Rust Toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Restore Cargo Registry Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Restore Cargo Build Artifacts Cache
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-

      - name: Build CritterCraft Node (Release Mode)
        # --release for optimized, production-ready build.
        # --locked ensures Cargo.lock is not modified.
        run: cargo build --release --locked --workspace
  # Job 4: Run Core Unit & Integration Tests (Rust)
  test_core_rust:
    name: Run Core Tests (Rust)
    runs-on: ubuntu-latest
    needs: [build_node]  # Depends on a successful build.
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Restore Rust environment and caches.
      - name: Restore Rust Toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Restore Cargo Registry Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Restore Cargo Build Artifacts Cache
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-

      - name: Run All Rust Tests
        # --workspace to run tests across all crates.
        run: cargo test --workspace -- --nocapture
      - name: Upload Test Results
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

  # Job 5: Security Vulnerability Scan (Rust Dependencies)
  security_audit_rust:
    name: Security Audit (Rust)
    runs-on: ubuntu-latest
    needs: [build_node]  # Can run in parallel with tests.
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Restore Rust environment and caches.
      - name: Restore Rust Toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Restore Cargo Registry Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Restore Cargo Build Artifacts Cache
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-

      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Run cargo-audit
        # Audits dependencies for known vulnerabilities.
        run: cargo audit --deny warnings
  # Job 6: Build Conceptual Frontend UI
  build_frontend_ui:
    name: Build Frontend UI (Conceptual)
    runs-on: ubuntu-latest
    needs: [setup_rust_env]  # Can run in parallel with Rust jobs.
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      - name: Install Frontend Dependencies
        run: yarn install
        working-directory: ./blockchain_core/ui-wallet
      - name: Build Frontend
        run: yarn build
        working-directory: ./blockchain_core/ui-wallet

  # Job 7: Check Documentation Integrity (for markdown files)
  check_documentation_integrity:
    name: Check Docs Integrity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Install Markdown Link Checker
        run: npm install -g markdown-link-check
      - name: Check Markdown Links
        # Checks for broken links in .md files.
        run: find . -name "*.md" -print0 | xargs -0 -I{} markdown-link-check {}
