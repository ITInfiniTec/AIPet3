---
name: CritterCraft CI/CD Pipeline

on:  # yamllint disable-line rule:truthy
  # Triggers the workflow on push or pull request events for the "main" branch
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  # ⚡ OPTIMIZATION: The 'setup_rust_env' job has been removed.
  # Each job now handles its own setup, allowing for maximum parallelization.
  # The pipeline is faster as jobs no longer wait for a shared setup step.

  lint_and_format_rust:
    name: Code Quality & Style (Rust)
    runs-on: ubuntu-latest
    # This job can run in parallel with other jobs like build_node.
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true
          components: rustfmt, clippy

      - name: Cache Cargo Registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Run Rustfmt (Code Formatter Check)
        run: cargo fmt --all -- --check

      - name: Run Clippy (Rust Linter)
        run: cargo clippy --all-targets -- -D warnings

  build_node:
    name: Build CritterCraft Node
    runs-on: ubuntu-latest
    # This job can run in parallel.
    # Downstream jobs (test, audit) depend on it.
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Cache Cargo Registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache Cargo Build Artifacts
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-

      - name: Build CritterCraft Node (Release Mode)
        # --release for optimized, production-ready build
        # --locked ensures Cargo.lock is not modified, for repeatable builds
        run: cargo build --release --locked --workspace

  test_core_rust:
    name: Run Core Tests (Rust)
    runs-on: ubuntu-latest
    needs: [build_node]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Cache Cargo Registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Restore Build Artifacts
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-

      - name: Run All Rust Tests
        run: cargo test --workspace -- --nocapture
      - name: Upload Test Results
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

  security_audit_rust:
    name: Security Audit (Rust)
    runs-on: ubuntu-latest
    needs: [build_node]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Cache Cargo Registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Restore Build Artifacts
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-

      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Run cargo-audit
        run: cargo audit --deny warnings

  build_frontend_ui:
    name: Build Frontend UI (Conceptual)
    runs-on: ubuntu-latest
    # This job can run in parallel with all other jobs.
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      - name: Install Frontend Dependencies
        run: yarn install
        working-directory: ./blockchain_core/ui-wallet
      - name: Build Frontend
        run: yarn build
        working-directory: ./blockchain_core/ui-wallet

  check_documentation_integrity:
    name: Check Docs Integrity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Install Markdown Link Checker
        run: npm install -g markdown-link-check
      - name: Check Markdown Links
        run: find . -name "*.md" -print0 | xargs -0 -I{} markdown-link-check {}
