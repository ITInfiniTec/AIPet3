---
name: CritterCraft CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  # Job 1: Build all crates and cache the results.
  # This job compiles the entire workspace in release mode.
  # The key optimization is caching the 'target' directory, which contains all
  # compiled artifacts. Subsequent jobs will restore this cache to avoid
  # expensive recompilation, making them significantly faster.
  build:
    name: Build & Cache
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Cache Cargo Registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache Cargo Build Artifacts (target directory)
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-

      - name: Build CritterCraft Node (Release Mode)
        # Build the entire workspace. The artifacts are stored in the 'target'
        # directory and cached for other jobs.
        run: cargo build --release --locked --workspace

  # Job 2: Run linters and formatters.
  # Runs in parallel with test and security_audit after 'build' is complete.
  # Restores the 'target' cache so it doesn't need to recompile code.
  lint_and_format:
    name: Code Quality & Style
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true
          components: rustfmt, clippy

      - name: Restore Cargo Registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Restore Cargo Build Artifacts
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}

      - name: Run Rustfmt (Code Formatter Check)
        run: cargo fmt --all -- --check

      - name: Run Clippy (Rust Linter)
        run: cargo clippy --all-targets -- -D warnings

  # Job 3: Run all unit and integration tests.
  # Runs in parallel with lint_and_format and security_audit.
  # Restores the 'target' cache to run tests against already-compiled code.
  test:
    name: Run Core Tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Restore Cargo Registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Restore Cargo Build Artifacts
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}

      - name: Run All Rust Tests
        # Test the release build to ensure optimizations haven't broken anything.
        run: cargo test --workspace --release -- --nocapture

      - name: Upload Test Results
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

  # Job 4: Run security audit on dependencies.
  # Runs in parallel with lint_and_format and test.
  # Restores the 'target' cache to avoid recompilation.
  security_audit:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Restore Cargo Registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Restore Cargo Build Artifacts
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo-audit
        run: cargo audit --deny warnings
