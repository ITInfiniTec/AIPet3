<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CritterCraft Wallet</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #f8fafc; color: #1e293b; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .card { background: white; padding: 2rem; border-radius: 1rem; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; border: 1px solid #e2e8f0; }
    .btn { background: #6366f1; color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 0.5rem; font-weight: 600; cursor: pointer; width: 100%; transition: 0.2s; }
    .btn:hover { background: #4f46e5; }
    .btn:focus-visible { outline: 2px solid #6366f1; outline-offset: 2px; }
    .status { margin-top: 1rem; font-size: 0.875rem; color: #64748b; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
    .dot { width: 8px; height: 8px; background: #cbd5e1; border-radius: 50%; }
  </style>
</head>
<body>
  <main class="card">
    <h1>CritterCraft Wallet</h1>
    <p>Manage your AI pets and assets.</p>
    <button id="b" class="btn">Connect Wallet</button>
    <div class="status" aria-live="polite"><span class="dot" id="d"></span><span id="t">Disconnected</span></div>
  </main>
  <script>
    const b=document.getElementById('b'),t=document.getElementById('t'),d=document.getElementById('d');
    b.onclick=()=>{
      b.disabled=true; b.textContent='Connecting...';
      setTimeout(()=>{
        b.textContent='Connected'; b.style.background='#10b981';
        t.textContent='Connected to CritterChain'; d.style.background='#10b981';
      },1000);
    };
  </script>
</body>
</html>
