<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CritterCraft Wallet</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #f8fafc; color: #1e293b; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .card { background: white; padding: 2rem; border-radius: 1rem; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; border: 1px solid #e2e8f0; }
    .btn { background: #6366f1; color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 0.5rem; font-weight: 600; cursor: pointer; width: 100%; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
    .btn:hover { background: #4f46e5; }
    .btn:focus-visible { outline: 2px solid #6366f1; outline-offset: 2px; }
    .btn:disabled { opacity: 0.7; cursor: not-allowed; }
    .status { margin-top: 1rem; font-size: 0.875rem; color: #64748b; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
    .dot { width: 8px; height: 8px; background: #cbd5e1; border-radius: 50%; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { width: 1rem; height: 1rem; border: 2px solid rgba(255,255,255,.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s linear infinite; }
  </style>
</head>
<body>
  <main class="card">
    <h1>CritterCraft Wallet</h1>
    <p>Manage your AI pets and assets.</p>
    <button id="connect-wallet-btn" class="btn" aria-label="Connect your blockchain wallet">Connect Wallet</button>
    <div class="status" aria-live="polite">
      <span class="dot" id="status-dot" aria-hidden="true"></span>
      <span id="status-text">Disconnected</span>
    </div>
  </main>
  <script>
    const btn = document.getElementById('connect-wallet-btn');
    const statusText = document.getElementById('status-text');
    const statusDot = document.getElementById('status-dot');

    btn.onclick = () => {
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Connecting...';

      setTimeout(() => {
        btn.textContent = 'Connected';
        btn.style.background = '#047857'; // Emerald 700 for better contrast
        statusText.textContent = 'Connected to CritterChain';
        statusDot.style.background = '#10b981';
      }, 1000);
    };
  </script>
</body>
</html>
